<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISKNHI UI</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="script/dashboard.js"></script>
    <script src="script/auth.js"></script>
</head>

<body>
    <div class="app-container">
        <header class="main-header">
            <nav class="top-nav">
                <a href="#" class="logout-icon" aria-label="Logout" onclick="logout()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </a>

                <a class="account-icon" aria-label="Account" href="/information">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 2a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"></path>
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                    </svg>
                </a>
            </nav>

            <div class="logo-section">
                <div class="logo-icon">
                    👤 </div>
                <h1 class="brand-name">RISKNHI</h1>
            </div>

            <p class="tagline">Stay away from illness, care for others.</p>
        </header>

        <main class="content-area">

            <section class="card status-card" id="status-card">
                <div class="status-item-wrapper">
                    <div class="icon-box location-bg">
                        <span class="icon">📍</span>
                    </div>
                    <div class="info-content">
                        <span class="label">Current Location</span>
                        <span class="value" id="atBuilding">กำลังโหลด...</span>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="status-item-wrapper">
                    <div class="icon-box health-bg">
                        <span class="icon">💓</span>
                    </div>
                    <div class="info-content">
                        <span class="label">Health Status</span>
                        <span class="value" id="userStatus">กำลังโหลด...</span>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="status-item-wrapper">
                    <div class="icon-box risk-bg">
                        <span class="icon">⚠️</span> </div>
                    <div class="info-content">
                        <span class="label">Risk Level</span>
                        <span class="value badge" id="riskLevel">กำลังโหลด...</span>
                    </div>
                </div>
            </section>

            <section class="card nearby-card">
                <h2 class="card-title">Nearby</h2>

                <table>
                    <thead class="table-header">
                        <tr>
                            <th class="col col-1">อาคาร</th>
                            <th class="col col-2">จำนวนผู้ป่วย</th>
                            <th class="col col-3">ความเสี่ยง</th>
                        </tr>
                    </thead>
                    <tbody class="table-body">
                    </tbody>
                </table>
            </section>

            <button class="main-btn sick-btn" id="imSick">I'm sick</button>
            <button class="main-btn sick-btn" id="imFine" style="display: none;">I'm Fine</button>

        </main>
    </div>

    <div id="sickStatusPopup" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="popup-title">
        <div class="modal-content">
            <button class="modal-close" aria-label="ปิดหน้าต่าง" id="sickStatusPopupClose">
                &times;
            </button>
            <h3 id="popup-title" class="modal-title">สวัสดี! ยังรู้สึกป่วยอยู่ไหม?</h3>

            <fieldset class="location-section">
                <legend class="location-label">ตอนนี้คุณอยู่ที่ไหน?</legend>
                
                <div class="popup-input-wrapper">
                    
                    <select class="buildingSelect custom-select popup-select" aria-label="เลือกอาคาร">
                        <option value="" disabled selected>เลือกสถานที่</option>
                    </select>
                    <div class="select-arrow">▼</div>

                    <select class="floorSelect custom-select popup-select" aria-label="เลือกชั้น">
                        <option value="" disabled selected>เลือกชั้น</option>
                    </select>
                    <div class="select-arrow">▼</div>

                </div>

                <div class="status-btn-group" style="margin-top: 25px;">
                    <button class="status-btn btn-red confirm-btn" style="margin-top: 0;"> <div class="btn-text">
                            <strong>ใช่, ยังป่วย</strong>
                            <small>บันทึกอาการต่อเนื่อง</small>
                        </div>
                    </button>

                    <button class="status-btn btn-green">
                        <div class="btn-text">
                            <strong id="getWellBtn">ไม่, หายดีแล้ว</strong>
                            <small>ยืนยันสุขภาพ</small>
                        </div>
                    </button>
                </div>

            </fieldset>
        </div>
    </div>

    <div id="StatusPopup" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="popup-title">
        <div class="modal-content">
            <button class="modal-close" aria-label="ปิดหน้าต่าง" id="StatusPopupClose">
                &times;
            </button>
            <h3 id="popup-title" class="modal-title">สวัสดี! คุณอยู่ที่ไหน?</h3>
            
            <fieldset class="location-section">
                <div class="popup-input-wrapper">
                    
                    <select class="buildingSelect custom-select popup-select" aria-label="เลือกอาคาร">
                        <option value="" disabled selected>เลือกสถานที่</option>
                    </select>
                    <div class="select-arrow">▼</div>

                    <select class="floorSelect custom-select popup-select" aria-label="เลือกชั้น">
                        <option value="" disabled selected>เลือกชั้น</option>
                    </select>
                    <div class="select-arrow">▼</div>

                    <button class="main-btn confirm-btn" id="StatusPopupConfirm">ยืนยัน</button>
                </div>
            </fieldset>
        </div>
    </div>

</body>
</html>
